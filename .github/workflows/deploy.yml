name: Verify and Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: foliocraft-production
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      # - name: Lint
        # run: npm run lint --if-present

      # - name: Test
        # run: npm test --if-present

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: verify
    environment: production

    steps:
      - name: Deploy exact commit over SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT }}
          fingerprint: ${{ secrets.EC2_HOST_FINGERPRINT }}
          envs: DEPLOY_SHA
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd ~/apps/foliocraft

            git fetch origin "$DEPLOY_SHA"
            git checkout --force "$DEPLOY_SHA"

            npm ci
            npm run build

            if pm2 describe foliocraft >/dev/null 2>&1; then
              pm2 reload foliocraft --update-env
            else
              pm2 start npm --name foliocraft -- start
            fi

            pm2 save
